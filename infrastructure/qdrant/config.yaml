log_level: INFO

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  max_request_size_mb: 128

storage:
  storage_path: /qdrant/storage
  snapshot_path: /qdrant/storage/snapshots
  on_disk_payload: true

  performance:
    max_search_threads: 0
    max_optimization_threads: 2

  optimizers:
    deleted_threshold: 0.2
    vacuum_min_vector_number: 1000
    default_segment_number: 2
    max_segment_size_kb: 500000
    memmap_threshold_kb: 1000000
    indexing_threshold_kb: 25000
    flush_interval_sec: 5

  hnsw_index:
    m: 16
    ef_construct: 100
    full_scan_threshold: 10000
    max_indexing_threads: 0

  wal:
    wal_capacity_mb: 64
    wal_segments_ahead: 1