global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: multi-agent-system

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: /metrics

  - job_name: embedding
    static_configs:
      - targets: ['embedding:8001']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: reranker
    static_configs:
      - targets: ['reranker:8002']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: postgres
    static_configs:
      - targets: ['postgres:5432']

  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']